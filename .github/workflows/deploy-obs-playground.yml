name: Deploy GenUI SDK Playground to Huawei OBS

on:
  push:
    paths:
      - 'sites/playground/web/**'
  workflow_dispatch:
    inputs:
      env:
        description: 选择您将要发布的环境
        required: false
        type: choice
        default: alpha
        options:
          - alpha
          - prod

env:
  # 在 GitHub 项目源码仓库 → 项目的 Settings → Secrets(Actions 里的 Repository secrets) 里提前建好以下变量
  HUAWEI_CLOUD_AK: ${{ secrets.HUAWEI_CLOUD_AK }}
  HUAWEI_CLOUD_SK: ${{ secrets.HUAWEI_CLOUD_SK }}
  HUAWEI_CLOUD_ENDPOINT: ${{ secrets.HUAWEI_CLOUD_ENDPOINT }}
  HUAWEI_CLOUD_BUCKET: ${{ secrets.HUAWEI_CLOUD_BUCKET }}
  GENUI_ASSETS_URL: ${{ secrets.GENUI_ASSETS_URL }}
  DEPLOY_ENV: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.env || 'alpha' }}

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    environment: ${{  github.event.inputs.env || 'alpha' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Install deps
        run: pnpm install
      - name: Show environment
        run: |
          echo "Building environment: ${{ env.DEPLOY_ENV }}"
          echo "GENUI_ASSETS_URL: ${{ env.GENUI_ASSETS_URL }}"
          echo "GENUI_BACKEND_URL: ${{ vars.GENUI_BACKEND_URL }}"
      - name: Build genui-sdk-playground-web
        run: pnpm build:playground-web --base=${{ env.GENUI_ASSETS_URL }}/${{ env.DEPLOY_ENV }}/
        env:
          NODE_OPTIONS: --max_old_space_size=4096
          VITE_CHAT_URL: ${{ vars.GENUI_BACKEND_URL }}/chat-genui
          VITE_GET_MODELS_URL: ${{ vars.GENUI_BACKEND_URL }}/get-models
          VITE_CHECK_MCP_URL: ${{ vars.GENUI_BACKEND_URL }}/check-mcp
      - name: Copy files
        run: |
          cp sites/playground/web/dist/index.html sites/playground/web/dist/404.html
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-artifact
          path: sites/playground/web/dist/
  # Deploy job
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.env }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-artifact
          path: sites/playground/web/dist/
      - name: Show environment
        run: |
          echo "Deploying environment: ${{ env.DEPLOY_ENV }}"
      # ===== 下载 obsutil =====
      - name: Install obsutil
        run: |
          curl -o obsutil.tar.gz https://obs-community.obs.cn-north-1.myhuaweicloud.com/obsutil/current/obsutil_linux_amd64.tar.gz
          tar -xzf obsutil.tar.gz
          chmod +x obsutil_linux_amd64_*/obsutil
          sudo mv obsutil_linux_amd64_*/obsutil /usr/local/bin/obsutil

      # ===== 配置并上传 =====
      - name: Upload to OBS
        run: |
          # 一次性配置 AK/SK/endpoint
          obsutil config -i=${{ env.HUAWEI_CLOUD_AK }} \
                         -k=${{ env.HUAWEI_CLOUD_SK }} \
                         -e=${{ env.HUAWEI_CLOUD_ENDPOINT }}

          # 把本地 dist/ 目录整站同步到桶根目录
          echo "Environment: ${{ env.DEPLOY_ENV }}"
          mv sites/playground/web/dist ${{ env.DEPLOY_ENV }}
          obsutil cp ${{ env.DEPLOY_ENV }} obs://${{ env.HUAWEI_CLOUD_BUCKET }}/genui-sdk-playground -r -f
